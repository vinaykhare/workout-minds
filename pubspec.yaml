name: workout_minds
description: "A new Flutter project for the Workout Minds"
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.11.0
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  # State Management (Riverpod)
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  # Local Persistence (Drift/SQLite)
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.25
  path_provider: ^2.1.5
  path: ^1.9.1
  # AI & Agentic Logic
  langchain: ^0.8.0 # For the Agentic Loop and Tool Calling
  google_generative_ai: ^0.4.0 # Vertex AI for Firebase integration
  # Interactive Workout Engine (Audio & Background)
  audio_service: ^0.18.17 # Background isolate persistence
  flutter_tts: ^4.2.2 # Voice guidance
  just_audio: ^0.9.42 # Optional: for metronome or sound effects
  # Data Viz & Sharing
  fl_chart: ^0.70.0 # Statistics dashboard
  share_plus: ^10.1.0 # JSON workout export
  json_annotation: ^4.9.0
  rxdart: ^0.28.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Code Generation
  build_runner: ^2.4.13
  drift_dev: ^2.20.0
  riverpod_generator: ^2.6.0
  json_serializable: ^6.9.0

  # Advanced Integration Testing
  patrol: ^3.7.0 # Required for testing background notifications and audio
flutter:
  uses-material-design: true
  generate: true
