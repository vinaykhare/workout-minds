name: workout_minds
description: "A new Flutter project for the Workout Minds"
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.11.0
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  # State Management (Riverpod)
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  # Local Persistence (Drift/SQLite)
  drift: ^2.20.0
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.5
  path: ^1.9.1
  # AI & Agentic Logic
  langchain: ^0.8.0 # For the Agentic Loop and Tool Calling
  google_generative_ai: ^0.4.0 # Vertex AI for Firebase integration
  # Interactive Workout Engine (Audio & Background)
  audio_service: ^0.18.17 # Background isolate persistence
  flutter_tts: ^4.2.2 # Voice guidance
  just_audio: ^0.10.5 # Optional: for metronome or sound effects
  # Data Viz & Sharing
  fl_chart: ^1.2.0 # Statistics dashboard
  share_plus: ^12.0.1 # JSON workout export
  json_annotation: ^4.9.0
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.4
  flutter_dotenv: ^6.0.0
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Code Generation
  build_runner: ^2.4.13
  drift_dev: ^2.20.0
  riverpod_generator: ^2.6.0
  json_serializable: ^6.9.0

  # Advanced Integration Testing
  patrol: ^4.3.0 # Required for testing background notifications and audio
flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/default_workout.jpg
